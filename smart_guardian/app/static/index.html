<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Smart Guardian</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .log-area { background: #222; color: #0f0; padding: 10px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>Painel Smart Guardian</h1>

    <div class="box">
        <h3>Monitoramento</h3>
        <button id="btnToggle" onclick="toggleCamera()">Ligar Câmera</button>
        <video id="video" width="320" autoplay style="display:none;"></video>
        <div id="log" class="log-area">Sistema pronto.</div>
    </div>

    <div class="box">
        <h3>Gerenciar Responsáveis</h3>
        <input id="in_nome" placeholder="Nome">
        <input id="in_telefone" placeholder="+5511999999999">
        <select id="in_nivel">
            <option value="primario">Primário</option>
            <option value="emergencial">Emergencial</option>
            <option value="critico">Crítico</option>
        </select>
        <button onclick="cadastrarContato()">Cadastrar</button>

        <table>
            <thead><tr><th>Nome</th><th>Telefone</th><th>Nível</th><th>Ação</th></tr></thead>
            <tbody id="tabelaContatos"></tbody>
        </table>
    </div>

    <script>
        let stream = null, interval = null;

        async function listarContatos() {
            const res = await fetch('/api/contatos');
            const data = await res.json();
            const tbody = document.getElementById('tabelaContatos');
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${c.nome}</td>
                    <td>${c.telefone}</td>
                    <td>${c.nivel}</td>
                    <td><button onclick="remover('${c.id}')" style="color:red;">Excluir</button></td>
                </tr>`).join('');
        }

        async function cadastrarContato() {
            const dados = { nome: document.getElementById('in_nome').value, telefone: document.getElementById('in_telefone').value, nivel: document.getElementById('in_nivel').value };
            const res = await fetch('/api/contatos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dados) });
            if (res.ok) { listarContatos(); alert("Cadastrado!"); } else { alert("Erro ao cadastrar."); }
        }

        async function remover(id) {
            await fetch(`/api/contatos/${id}`, { method: 'DELETE' });
            listarContatos();
        }

        async function toggleCamera() {
            const btn = document.getElementById('btnToggle');
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null; clearInterval(interval);
                document.getElementById('video').style.display = 'none';
                btn.innerText = "Ligar Câmera";
            } else {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').style.display = 'block';
                btn.innerText = "Desligar Câmera";
                interval = setInterval(enviarFrame, 1500);
            }
        }

        async function enviarFrame() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            canvas.toBlob(async blob => {
                let fd = new FormData(); fd.append('frame', blob);
                const res = await fetch('/api/deteccao/frame', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.crianca_sozinha) document.getElementById('log').innerHTML += "<div>> ALERTA: Criança detectada!</div>";
            }, 'image/jpeg');
        }

        window.onload = listarContatos;
    </script>
</body>
</html>
